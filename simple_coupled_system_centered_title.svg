<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Coupled Relationship System</title>
  <desc id="desc">Two coupled agents A and B with mutual influence, reward, and control, plus self dynamics of decay, noise, and need.</desc>

  <rect x="0" y="0" width="1000" height="400" fill="white"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="26" font-weight="700" fill="black">
    Coupled Relationship System
  </text>

  <!-- Circles -->
  <circle cx="250" cy="200" r="70" fill="#3b82f6" stroke="black" stroke-width="2"/>
  <circle cx="750" cy="200" r="70" fill="#ef4444" stroke="black" stroke-width="2"/>

  <!-- Center labels -->
  <text x="250" y="207" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="20" font-weight="400" fill="white">A</text>
  <text x="750" y="207" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="20" font-weight="400" fill="white">B</text>

  <!-- A to B arrow -->
  <line x1="320" y1="180" x2="680" y2="180" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  <polygon points="680,180 665,172 665,188" fill="#10b981"/>
  <text x="500" y="140" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="20" fill="#10b981">
    influence / reward / control
  </text>

  <!-- B to A arrow -->
  <line x1="680" y1="220" x2="320" y2="220" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
  <polygon points="320,220 335,212 335,228" fill="#6366f1"/>
  <text x="500" y="280" text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="20" fill="#6366f1">
    influence / reward / control
  </text>

  <!-- Left self loop -->
  <path d="M 310 175
           C 300 145, 250 125, 205 145
           C 170 160, 165 225, 200 245
           C 235 265, 285 250, 300 225"
        fill="none" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <text x="170" y="100"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="20" fill="#374151">
    baseline recovery / noise / need
  </text>

  <!-- Right self loop -->
  <path d="M 810 175
           C 800 145, 750 125, 705 145
           C 670 160, 665 225, 700 245
           C 735 265, 785 250, 800 225"
        fill="none" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>
  <text x="720" y="100"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-size="20" fill="#374151">
    baseline recovery / noise / need
  </text>
</svg>
